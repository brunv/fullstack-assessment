services:
  db:
    image: postgres:16
    container_name: tr_db
    environment:
      POSTGRES_DB: truerestore
      POSTGRES_USER: truerestore
      POSTGRES_PASSWORD: truerestore
    ports:
      - "5432:5432"
    volumes:
      - tr_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truerestore"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: tr_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console -> http://localhost:9001
    volumes:
      - tr_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot job: create the bucket the API expects and make it public-read for demo.
  createbuckets:
    image: minio/mc:latest
    container_name: tr_createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/truerestore-media;
      mc anonymous set download local/truerestore-media;
      echo 'MinIO bucket truerestore-media ready';
      exit 0;
      "

  api:
    build: ./apps/api
    container_name: tr_api
    env_file:
      - ./apps/api/.env.docker
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

volumes:
  tr_postgres_data:
  tr_minio_data:
